<h2>Formulario de pedido  </h2>

<form action="#" method="post">

<!-- DATOS PERSONALES -->
<fieldset>
<legend>Datos personales</legend>

<p>
<label for="name">Nombre:</label><br>
<input type="text" id="name" name="name" required>
</p>

<p>
<label for="phone">Teléfono:</label><br>
<input type="tel" id="phone" name="phone" required>
</p>

<p>
<label for="email">Email:</label><br>
<input type="email" id="email" name="email" required>
</p>

</fieldset>

<!-- PRODUCTO -->
<fieldset>
<legend>Producto</legend>

<p>
<label for="modelo">Producto:</label><br>
<select id="modelo" name="modelo" required>
<option value="">Selecciona</option>
<option>Balón</option>
<option>Botas</option>
<option>Camiseta</option>
</select>
</p>

<p>
Talla:<br>

<input type="radio" name="talla" value="S" required> S
<input type="radio" name="talla" value="M"> M
<input type="radio" name="talla" value="L"> L

</p>

<p>
<label for="color">Color:</label><br>
<input type="color" id="color" name="color" required>
</p>

<p>
<label for="cantidad">Cantidad:</label><br>
<input type="number" id="cantidad" name="cantidad" min="1" max="5" required>
</p>

<p>
Extras:<br>

<input type="checkbox" name="extra1"> Personalización<br>
<input type="checkbox" name="extra2"> Envío rápido<br>
<input type="checkbox" name="extra3"> Embalaje regalo

</p>

</fieldset>

<!-- ENTREGA -->
<fieldset>
<legend>Entrega</legend>

<p>
<label for="fecha">Fecha:</label><br>
<input type="date" id="fecha" name="fecha" required>
</p>

<p>
<label for="comentarios">Instrucciones:</label><br>
<textarea id="comentarios" name="comentarios"></textarea>
</p>

</fieldset>

<!-- BOTONES -->
<fieldset>

<button type="submit">Enviar pedido</button>
<button type="reset">Borrar</button>

</fieldset>

</form>
